<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <link rel="stylesheet" href="/static/css/main.css">
</head>
<body class="centered">

<div class="card">
    <h2>Login</h2>
    <p class="small">Sign in to your account</p>

    <div 
        id="formAlert" 
        aria-live="polite" 
        class="{% if error %}alert error{% endif %}"
    >
        {% if error %}{{ error }}{% endif %}
    </div>

    <form id="loginForm" method="POST" action="/login" autocomplete="off">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div id="passwordStep">
            <input 
                type="text"
                name="username" 
                placeholder="Username" 
                required 
                maxlength="30">
            <input 
                type="password" 
                name="password" 
                placeholder="Password" 
                required 
                autocomplete="current-password">
            <button type="submit">Next</button>
        </div>

        <div id="otpStepContainer"></div>
    </form>

    <div id="otpMethodModal" class="modal-overlay hidden" aria-hidden="true" role="dialog" aria-labelledby="otpMethodTitle">
        <div class="modal">
            <h3 id="otpMethodTitle">Choose verification method</h3>
            <p class="small">Select how you want to complete 2-step verification.</p>
            <div class="button-row">
                <button type="button" data-otp-method="totp" id="chooseTotpMethod">
                    Use authenticator app
                </button>
                <button type="button" class="secondary" data-otp-method="email" id="chooseEmailMethod">
                    Send code to <span id="otpMaskedEmail"></span>
                </button>
            </div>
            <button type="button" class="link-button" id="cancelOtpChoice">Cancel</button>
        </div>
    </div>

</div>

<script src="/static/js/login.js"></script>
</body>
</html>
